name: Build ZMK Firmware

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Zephyr環境セットアップ
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git cmake ninja-build gperf \
            ccache dfu-util device-tree-compiler \
            wget python3-pip python3-setuptools python3-wheel \
            xz-utils file make gcc gcc-multilib g++-multilib \
            libsdl2-dev libmagic1

      - name: Install west
        run: pip install west

      - name: Init west
        run: |
          west init -l config
          west update
          west zephyr-export

      - name: Install Python deps
        run: pip install -r zephyr/scripts/requirements.txt

      - name: Build firmware
        run: |
          mkdir -p build artifacts

          for conf in $(yq '.include[] | @base64' build.yaml); do
            _jq() {
              echo ${conf} | base64 --decode | jq -r ${1}
            }

            BOARD=$(_jq '.board')
            SHIELD=$(_jq '.shield')
            ARGS=$(_jq '.["cmake-args"] // ""')
            ARTIFACT=$(_jq '.["artifact-name"] // "firmware"')

            BUILD_DIR=build/${ARTIFACT}

            echo "Building ${ARTIFACT}"
            west build -s zmk/app -d ${BUILD_DIR} -b ${BOARD} -- \
              -DZMK_CONFIG=${GITHUB_WORKSPACE}/config \
              -DSHIELD="${SHIELD}" ${ARGS}

            # HEX
            if [ -f "${BUILD_DIR}/zephyr/zmk.hex" ]; then
              cp "${BUILD_DIR}/zephyr/zmk.hex" artifacts/${ARTIFACT}.hex
            elif [ -f "${BUILD_DIR}/zephyr/zephyr.hex" ]; then
              cp "${BUILD_DIR}/zephyr/zephyr.hex" artifacts/${ARTIFACT}.hex
            fi

            # BIN
            if [ -f "${BUILD_DIR}/zephyr/zmk.bin" ]; then
              cp "${BUILD_DIR}/zephyr/zmk.bin" artifacts/${ARTIFACT}.bin
            fi

            # UF2
            if [ -f "${BUILD_DIR}/zephyr/zmk.uf2" ]; then
              cp "${BUILD_DIR}/zephyr/zmk.uf2" artifacts/${ARTIFACT}.uf2
            fi

            # ELF（デバッグ）
            if [ -f "${BUILD_DIR}/zephyr/zephyr.elf" ]; then
              cp "${BUILD_DIR}/zephyr/zephyr.elf" artifacts/${ARTIFACT}.elf
            fi

          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: artifacts/