CONFIG_ZMK_KEYBOARD_NAME="zonkey"

# ホスト（セントラル）として動作
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y

# BLE設定
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USB設定
CONFIG_ZMK_USB=y
CONFIG_USB_DEVICE_STACK=y

# ドングルはペリフェラルデバイスがないので不要
# CONFIG_ZMK_SPLIT_ROLE_PERIPHERAL は不要

# パワーマネジメント
CONFIG_ZMK_IDLE_TIMEOUT=30000

# ロギング（デバッグ用、必要に応じて）
# CONFIG_ZMK_USB_LOGGING=y
